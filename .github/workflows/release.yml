name: Handle Version Bump & Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/arrcal

jobs:
  tag-and-release:
    # Only run when CI passed on a push to main (not on PR CI completions)
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Check if version was bumped
        id: version_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=$TAG" >> "$GITHUB_OUTPUT"

          # Skip 0.0.0 — not a real release
          if [ "$VERSION" = "0.0.0" ]; then
            echo "Version is 0.0.0 — not a real release. Skipping."
            echo "BUMPED=false" >> "$GITHUB_OUTPUT"
          elif git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — version was not bumped. Skipping release."
            echo "BUMPED=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version bumped to $VERSION — proceeding with release."
            echo "BUMPED=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and Push Tag
        if: steps.version_check.outputs.BUMPED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version_check.outputs.TAG }}"
          git push origin "${{ steps.version_check.outputs.TAG }}"

      - name: Create GitHub Release
        if: steps.version_check.outputs.BUMPED == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version_check.outputs.TAG }}
          name: Release ${{ steps.version_check.outputs.TAG }}
          generate_release_notes: true

      - name: Log in to the Container registry
        if: steps.version_check.outputs.BUMPED == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Build the image ─────────────────────────
      - name: Build Docker image
        if: steps.version_check.outputs.BUMPED == 'true'
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.version_check.outputs.TAG }} \
            -t arrcal:${{ steps.version_check.outputs.VERSION }} \
            .

      # ── Slim it (overwrites same tag) ───────────
      - name: Slim Docker image
        if: steps.version_check.outputs.BUMPED == 'true'
        uses: kitabisa/docker-slim-action@v1
        env:
          DSLIM_HTTP_PROBE: false
        with:
          target: arrcal:${{ steps.version_check.outputs.VERSION }}
          overwrite: true

      # ── Tag as version + latest & push ──────────
      - name: Push slimmed image
        if: steps.version_check.outputs.BUMPED == 'true'
        run: |
          docker tag arrcal:${{ steps.version_check.outputs.VERSION }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version_check.outputs.VERSION }}
          docker tag arrcal:${{ steps.version_check.outputs.VERSION }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version_check.outputs.VERSION }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
