; =========================================================================
; ArrCal Production PHP Configuration — OPcache + JIT
; =========================================================================
; Applied at: /usr/local/etc/php/conf.d/99-performance.ini
; Target:    PHP 8.2+ production mode
; Context:   .opencode/context/development/backend/performance.md
; =========================================================================

[opcache]
; Bytecode caching — eliminates per-request parse/compile overhead
opcache.enable=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000

; Production: skip file stat checks on every request.
; File changes require a container restart.
opcache.validate_timestamps=0
opcache.revalidate_freq=0

; Required for annotation-based libraries and docblock parsing
opcache.save_comments=1
opcache.enable_file_override=0

; =========================================================================

; JIT — function-level tracing (mode 1255)
; Compiles hot code paths to native machine code.
; Recommended for CPU-bound workloads. Drop buffer to 64M if memory-constrained.
opcache.jit_buffer_size=128M
opcache.jit=1255
