<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>ArrCal</title>
  <defs>
    <clipPath id="calClip">
      <rect x="5" y="12" width="54" height="49" rx="9"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect width="64" height="64" rx="13" fill="#0f172a"/>

  <!-- Calendar binding tabs -->
  <rect x="19" y="4" width="8" height="14" rx="4" fill="#334155"/>
  <rect x="37" y="4" width="8" height="14" rx="4" fill="#334155"/>

  <!-- Calendar card base -->
  <rect x="5" y="12" width="54" height="49" rx="9" fill="#1e293b"/>

  <!-- Header left — Sonarr blue -->
  <rect x="5" y="12" width="27" height="18" clip-path="url(#calClip)" fill="#1e3a8a"/>

  <!-- Header right — Radarr amber -->
  <rect x="32" y="12" width="27" height="18" clip-path="url(#calClip)" fill="#78350f"/>

  <!-- Hairline divider between header halves -->
  <rect x="31" y="12" width="2" height="18" fill="#0f172a" opacity="0.5"/>

  <!-- Header / body separator -->
  <line x1="5" y1="30" x2="59" y2="30" stroke="#0f172a" stroke-width="1.5" opacity="0.4"/>

  <!-- Event pills — Row 1: blue · amber · blue -->
  <rect x="10" y="36" width="13" height="7" rx="3.5" fill="#3b82f6"/>
  <rect x="27" y="36" width="13" height="7" rx="3.5" fill="#f59e0b"/>
  <rect x="44" y="36" width="13" height="7" rx="3.5" fill="#3b82f6"/>

  <!-- Event pills — Row 2: amber · blue · amber -->
  <rect x="10" y="48" width="13" height="7" rx="3.5" fill="#f59e0b"/>
  <rect x="27" y="48" width="13" height="7" rx="3.5" fill="#3b82f6"/>
  <rect x="44" y="48" width="13" height="7" rx="3.5" fill="#f59e0b"/>
</svg>
